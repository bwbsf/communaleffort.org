<header class="site-header">
  <div class="site-header-inner container">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand-kicker">Burners Without Borders</span>
      <span class="brand-name">Communal Effort</span>
    </a>

    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Home</a>
      <a href="{{ '/chapters/' | relative_url }}"{% if page.url contains '/chapters/' %} aria-current="page"{% endif %}>Chapters</a>
      <a href="{{ '/categories/' | relative_url }}"{% if page.url contains '/categories/' %} aria-current="page"{% endif %}>Categories</a>
      <a href="{{ '/updates/' | relative_url }}"{% if page.url contains '/updates/' %} aria-current="page"{% endif %}>Updates</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about/' %} aria-current="page"{% endif %}>About</a>
    </nav>
  </div>
</header>
